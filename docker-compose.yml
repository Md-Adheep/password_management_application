services:

  # ── Flask app (Gunicorn) ───────────────────────────────────────────────────
  app:
    build:
      context: ./flask        # Build context = flask/ directory
      dockerfile: Dockerfile
    image: corpvault:latest
    container_name: corpvault_app
    ports:
      - "${APP_PORT:-5000}:5000"
    environment:
      # Flask / JWT
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      # Database — points to the db service below
      - DB_HOST=db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-password_manager}
      - DB_USER=${DB_USER:-corpvault}
      - DB_PASSWORD=${DB_PASSWORD}
      # Gunicorn tuning
      - PORT=5000
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - GUNICORN_WORKERS=${GUNICORN_WORKERS:-2}
    depends_on:
      db:
        condition: service_healthy   # Wait for MySQL to be ready before starting
    restart: unless-stopped
    networks:
      - corpvault_net
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      start_period: 25s
      retries: 3

  # ── MySQL 8 ───────────────────────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: corpvault_db
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-password_manager}
      MYSQL_USER: ${DB_USER:-corpvault}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql    # Persist database across restarts
    ports:
      - "${DB_EXPOSE_PORT:-3306}:3306"   # Expose for local GUI tools (TablePlus etc.)
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 10s
      timeout: 5s
      start_period: 30s
      retries: 5
    restart: unless-stopped
    networks:
      - corpvault_net

networks:
  corpvault_net:
    driver: bridge

volumes:
  db_data:    # Named volume — survives `docker compose down` (use --volumes to delete)
