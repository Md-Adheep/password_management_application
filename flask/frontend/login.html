<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpVaults – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    /* ── Login Page Layout ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      align-items: stretch;
      background: #0f172a;
    }

    /* ── Left Panel ── */
    .login-panel-left {
      flex: 1;
      background: linear-gradient(145deg, #4f46e5 0%, #7c3aed 60%, #a855f7 100%);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .login-panel-left::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 20% 20%, rgba(255,255,255,0.12) 0%, transparent 50%),
        radial-gradient(circle at 80% 80%, rgba(79,70,229,0.4) 0%, transparent 50%);
    }

    .login-panel-left .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(60px);
      opacity: 0.25;
    }
    .blob-1 { width: 300px; height: 300px; background: #818cf8; top: -80px; left: -80px; }
    .blob-2 { width: 250px; height: 250px; background: #c084fc; bottom: -60px; right: -60px; }

    .login-brand { position: relative; z-index: 1; text-align: center; color: #fff; }

    .login-brand .brand-icon {
      width: 80px;
      height: 80px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(10px);
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2rem;
      margin: 0 auto 1.25rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .login-brand h1 {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.4rem;
    }

    .login-brand p {
      font-size: 0.95rem;
      opacity: 0.8;
      margin-bottom: 3rem;
    }

    .feature-list {
      position: relative;
      z-index: 1;
      list-style: none;
      padding: 0;
      margin: 0;
      width: 100%;
      max-width: 320px;
    }

    .feature-list li {
      display: flex;
      align-items: center;
      gap: 0.85rem;
      color: rgba(255,255,255,0.9);
      font-size: 0.9rem;
      padding: 0.65rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }

    .feature-list li:last-child { border-bottom: none; }

    .feature-list .feat-icon {
      width: 34px;
      height: 34px;
      background: rgba(255,255,255,0.15);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }

    /* ── Right Panel ── */
    .login-panel-right {
      width: 480px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #ffffff;
      padding: 2.5rem 2rem;
    }

    .login-form-wrap { width: 100%; max-width: 380px; }

    .login-form-wrap .form-title {
      font-size: 1.65rem;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 0.35rem;
      letter-spacing: -0.4px;
    }

    .login-form-wrap .form-subtitle {
      font-size: 0.88rem;
      color: #64748b;
      margin-bottom: 2.2rem;
    }

    /* Floating label inputs */
    .input-float {
      position: relative;
      margin-bottom: 1.25rem;
    }

    .input-float label {
      position: absolute;
      left: 44px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 0.875rem;
      color: #94a3b8;
      pointer-events: none;
      transition: all 0.2s ease;
      background: transparent;
      padding: 0 4px;
    }

    .input-float .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1rem;
      transition: color 0.2s;
      z-index: 1;
    }

    .input-float input {
      width: 100%;
      height: 52px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      padding: 0 44px 0 44px;
      font-size: 0.92rem;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .input-float input:focus {
      border-color: #4f46e5;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79,70,229,0.08);
    }

    .input-float input:focus + label,
    .input-float input:not(:placeholder-shown) + label {
      top: 0;
      font-size: 0.72rem;
      color: #4f46e5;
      background: #fff;
      font-weight: 600;
    }

    .input-float input:focus ~ .input-icon { color: #4f46e5; }

    .input-float .pw-toggle {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .input-float .pw-toggle:hover { color: #4f46e5; }

    /* Sign In button */
    .btn-signin {
      width: 100%;
      height: 52px;
      background: linear-gradient(135deg, #4f46e5 0%, #7c3aed 100%);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.3px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
      box-shadow: 0 4px 20px rgba(79,70,229,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.5rem;
    }

    .btn-signin:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(79,70,229,0.45); }
    .btn-signin:active { transform: translateY(0); }
    .btn-signin:disabled { opacity: 0.7; cursor: not-allowed; transform: none; }

    /* Alert */
    .login-alert {
      border-radius: 10px;
      font-size: 0.875rem;
      padding: 0.7rem 1rem;
      margin-bottom: 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Trust badges */
    .trust-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #f1f5f9;
    }

    .trust-badge {
      display: flex;
      align-items: center;
      gap: 0.35rem;
      font-size: 0.72rem;
      color: #94a3b8;
      font-weight: 500;
    }

    .trust-badge i { font-size: 0.85rem; color: #22c55e; }

    /* ── Dark Mode ── */
    body.dark-mode .login-page { background: #0f172a; }
    body.dark-mode .login-panel-right { background: #1e293b; }
    body.dark-mode .login-form-wrap .form-title { color: #f1f5f9; }
    body.dark-mode .login-form-wrap .form-subtitle { color: #94a3b8; }
    body.dark-mode .input-float input {
      background: #263148;
      border-color: #334155;
      color: #f1f5f9;
    }
    body.dark-mode .input-float input:focus {
      background: #263148;
      border-color: #4f46e5;
    }
    body.dark-mode .input-float input:focus + label,
    body.dark-mode .input-float input:not(:placeholder-shown) + label {
      background: #263148;
    }
    body.dark-mode .trust-row { border-color: #334155; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .login-panel-left { display: none; }
      .login-panel-right {
        width: 100%;
        min-height: 100vh;
        padding: 2rem 1.5rem;
        align-items: center;
      }
      .login-form-wrap { max-width: 100%; }
    }
  </style>
</head>
<body>

  <script>
    if (localStorage.getItem('darkMode') === '1') {
      document.body.classList.add('dark-mode');
    }
  </script>

  <div class="login-page">

    <!-- ── Left Branding Panel ── -->
    <div class="login-panel-left">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>

      <div class="login-brand">
        <div class="brand-icon">
          <i class="bi bi-shield-lock-fill"></i>
        </div>
        <h1>CorpVaults</h1>
        <p>Your corporate password vault, secured.</p>
      </div>

      <ul class="feature-list">
        <li>
          <div class="feat-icon"><i class="bi bi-lock-fill"></i></div>
          <span>AES-256 encrypted storage</span>
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-people-fill"></i></div>
          <span>Role-based team access control</span>
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-clock-history"></i></div>
          <span>Full audit trail & activity logs</span>
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-shield-check"></i></div>
          <span>Password strength enforcement</span>
        </li>
      </ul>
    </div>

    <!-- ── Right Form Panel ── -->
    <div class="login-panel-right">
      <div class="login-form-wrap">

        <p class="form-title">Welcome back</p>
        <p class="form-subtitle">Sign in to access your vault</p>

        <div id="alert-box" class="login-alert alert d-none" role="alert"></div>

        <form id="login-form" novalidate>

          <!-- Username -->
          <div class="input-float">
            <i class="bi bi-person input-icon"></i>
            <input type="text" id="username" placeholder=" " autocomplete="username" required />
            <label for="username">Username</label>
          </div>

          <!-- Password -->
          <div class="input-float">
            <i class="bi bi-lock input-icon"></i>
            <input type="password" id="password" placeholder=" " autocomplete="current-password" required />
            <label for="password">Password</label>
            <button class="pw-toggle" type="button" id="toggle-pw" tabindex="-1" aria-label="Toggle password visibility">
              <i class="bi bi-eye" id="pw-eye-icon"></i>
            </button>
          </div>

          <button type="submit" class="btn-signin" id="login-btn">
            <span id="login-spinner" class="spinner-border spinner-border-sm d-none"></span>
            <span id="login-btn-text">Sign In</span>
            <i class="bi bi-arrow-right" id="login-arrow"></i>
          </button>

        </form>

        <div class="trust-row">
          <div class="trust-badge">
            <i class="bi bi-shield-check-fill"></i>
            <span>Encrypted</span>
          </div>
          <div class="trust-badge">
            <i class="bi bi-lock-fill"></i>
            <span>Secure Session</span>
          </div>
          <div class="trust-badge">
            <i class="bi bi-eye-slash-fill" style="color:#64748b"></i>
            <span>Zero Knowledge</span>
          </div>
        </div>

      </div>
    </div>

  </div>

  <script>
    // Password toggle — keep same #toggle-pw id for auth.js compatibility
    document.getElementById('toggle-pw').addEventListener('click', function () {
      const pwInput = document.getElementById('password');
      const icon = document.getElementById('pw-eye-icon');
      if (pwInput.type === 'password') {
        pwInput.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        pwInput.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
