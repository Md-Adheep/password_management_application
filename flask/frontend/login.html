<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Password Manager – Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="auth-page">

  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-logo">
        <i class="bi bi-shield-lock-fill"></i>
        <h2>CorpVaults</h2>
        <p class="text-muted">Corporate Password Manager</p>
      </div>

      <div id="alert-box" class="alert d-none" role="alert"></div>

      <form id="login-form">
        <div class="mb-3">
          <label class="form-label">Username</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-person"></i></span>
            <input type="text" class="form-control" id="username" placeholder="Enter username" required />
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Password</label>
          <div class="input-group">
            <span class="input-group-text"><i class="bi bi-lock"></i></span>
            <input type="password" class="form-control" id="password" placeholder="Enter password" required />
            <button class="btn btn-outline-secondary" type="button" id="toggle-pw">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary w-100 mt-2" id="login-btn">
          <span id="login-spinner" class="spinner-border spinner-border-sm d-none me-2"></span>
          Sign In
        </button>
      </form>
    </div>
  </div>

  <script src="js/auth.js"></script>
</body>
</html>
