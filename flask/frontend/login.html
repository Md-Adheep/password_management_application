<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpVaults – Sign In</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
  <style>
    /* ── Page ── */
    .login-page {
      min-height: 100vh;
      display: flex;
      background: #0f172a;
    }

    /* ── Left branding panel ── */
    .login-left {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem 2.5rem;
      background: linear-gradient(150deg, #4338ca 0%, #6d28d9 55%, #7c3aed 100%);
      overflow: hidden;
    }

    /* Decorative circles */
    .login-left::before,
    .login-left::after {
      content: '';
      position: absolute;
      border-radius: 50%;
      opacity: 0.12;
    }
    .login-left::before {
      width: 480px; height: 480px;
      background: #fff;
      top: -160px; left: -160px;
    }
    .login-left::after {
      width: 360px; height: 360px;
      background: #fff;
      bottom: -120px; right: -80px;
    }

    .brand-wrap {
      position: relative;
      z-index: 1;
      text-align: center;
      color: #fff;
      margin-bottom: 3rem;
    }

    .brand-icon-box {
      width: 76px; height: 76px;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.3);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.1rem;
      margin: 0 auto 1.1rem;
      backdrop-filter: blur(8px);
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
    }

    .brand-wrap h1 {
      font-size: 1.9rem;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 0.3rem;
    }

    .brand-wrap p {
      font-size: 0.875rem;
      opacity: 0.75;
      margin: 0;
    }

    /* Feature list */
    .feat-list {
      position: relative;
      z-index: 1;
      list-style: none;
      padding: 0; margin: 0;
      width: 100%; max-width: 300px;
    }

    .feat-list li {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      color: rgba(255,255,255,0.88);
      font-size: 0.875rem;
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.1);
    }
    .feat-list li:last-child { border: none; }

    .feat-icon {
      width: 32px; height: 32px;
      background: rgba(255,255,255,0.15);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.95rem;
      flex-shrink: 0;
    }

    /* ── Right form panel ── */
    .login-right {
      width: 460px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      padding: 2.5rem 2rem;
    }

    .form-box { width: 100%; max-width: 360px; }

    .form-box .form-head { margin-bottom: 2rem; }
    .form-box .form-head h2 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: -0.4px;
      margin-bottom: 0.25rem;
    }
    .form-box .form-head p {
      font-size: 0.85rem;
      color: #64748b;
      margin: 0;
    }

    /* Custom input fields */
    .field-wrap {
      position: relative;
      margin-bottom: 1.1rem;
    }

    .field-wrap .field-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: #94a3b8;
      font-size: 1rem;
      pointer-events: none;
      transition: color 0.2s;
      z-index: 2;
    }

    .field-wrap input {
      width: 100%;
      height: 50px;
      padding: 0 44px;
      border: 1.5px solid #e2e8f0;
      border-radius: 12px;
      font-size: 0.9rem;
      color: #0f172a;
      background: #f8fafc;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .field-wrap input:focus {
      border-color: #4f46e5;
      background: #fff;
      box-shadow: 0 0 0 4px rgba(79,70,229,0.1);
    }

    .field-wrap input:focus ~ .field-icon { color: #4f46e5; }

    .field-wrap .field-label {
      display: block;
      font-size: 0.75rem;
      font-weight: 700;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.4rem;
    }

    .field-wrap .pw-eye {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #94a3b8;
      cursor: pointer;
      padding: 4px 6px;
      font-size: 1rem;
      transition: color 0.2s;
    }
    .field-wrap .pw-eye:hover { color: #4f46e5; }

    /* Sign in button */
    .btn-signin {
      width: 100%;
      height: 50px;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 16px rgba(79,70,229,0.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: 0.75rem;
    }
    .btn-signin:hover {
      opacity: 0.93;
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(79,70,229,0.42);
    }
    .btn-signin:active { transform: translateY(0); }
    .btn-signin:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    /* Alert */
    #alert-box {
      border-radius: 10px;
      font-size: 0.85rem;
      padding: 0.65rem 0.9rem;
      margin-bottom: 1.1rem;
    }

    /* Trust row */
    .trust-row {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2rem;
      padding-top: 1.5rem;
      border-top: 1px solid #f1f5f9;
    }
    .trust-item {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #94a3b8;
      font-weight: 600;
    }
    .trust-item i { font-size: 0.8rem; color: #22c55e; }

    /* ── Dark mode ── */
    body.dark-mode .login-page { background: #0f172a; }
    body.dark-mode .login-right { background: #1e293b; }
    body.dark-mode .form-box .form-head h2 { color: #f1f5f9; }
    body.dark-mode .field-wrap .field-label { color: #94a3b8; }
    body.dark-mode .field-wrap input {
      background: #263148;
      border-color: #334155;
      color: #f1f5f9;
    }
    body.dark-mode .field-wrap input:focus {
      background: #263148;
      border-color: #4f46e5;
    }
    body.dark-mode .trust-row { border-color: #334155; }

    /* ── Mobile ── */
    @media (max-width: 767px) {
      .login-left { display: none; }
      .login-right {
        width: 100%;
        min-height: 100vh;
        padding: 2.5rem 1.5rem;
      }
    }
  </style>
</head>
<body>
  <script>
    if (localStorage.getItem('darkMode') === '1') document.body.classList.add('dark-mode');
  </script>

  <div class="login-page">

    <!-- ── Left Panel ── -->
    <div class="login-left">
      <div class="brand-wrap">
        <div class="brand-icon-box"><i class="bi bi-shield-lock-fill"></i></div>
        <h1>CorpVaults</h1>
        <p>Corporate Password Manager</p>
      </div>

      <ul class="feat-list">
        <li>
          <div class="feat-icon"><i class="bi bi-lock-fill"></i></div>
          AES-256 encrypted storage
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-people-fill"></i></div>
          Role-based team access control
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-clock-history"></i></div>
          Full audit trail & activity logs
        </li>
        <li>
          <div class="feat-icon"><i class="bi bi-shield-check"></i></div>
          Password strength enforcement
        </li>
      </ul>
    </div>

    <!-- ── Right Panel ── -->
    <div class="login-right">
      <div class="form-box">

        <div class="form-head">
          <h2>Welcome back</h2>
          <p>Sign in to access your vault</p>
        </div>

        <div id="alert-box" class="alert d-none" role="alert"></div>

        <form id="login-form" novalidate>

          <!-- Username -->
          <div class="field-wrap">
            <label class="field-label" for="username">Username</label>
            <i class="bi bi-person field-icon"></i>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="username" required />
          </div>

          <!-- Password -->
          <div class="field-wrap">
            <label class="field-label" for="password">Password</label>
            <i class="bi bi-lock field-icon"></i>
            <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password" required />
            <button type="button" class="pw-eye" id="toggle-pw" aria-label="Toggle password">
              <i class="bi bi-eye" id="pw-eye-icon"></i>
            </button>
          </div>

          <button type="submit" class="btn-signin" id="login-btn">
            <span id="login-spinner" class="spinner-border spinner-border-sm d-none"></span>
            <span>Sign In</span>
            <i class="bi bi-arrow-right"></i>
          </button>

        </form>

        <div class="trust-row">
          <div class="trust-item"><i class="bi bi-shield-fill-check"></i> Encrypted</div>
          <div class="trust-item"><i class="bi bi-lock-fill"></i> Secure Session</div>
          <div class="trust-item"><i class="bi bi-eye-slash-fill" style="color:#64748b"></i> Private</div>
        </div>

      </div>
    </div>
  </div>

  <script>
    document.getElementById('toggle-pw').addEventListener('click', function () {
      const input = document.getElementById('password');
      const icon = document.getElementById('pw-eye-icon');
      if (input.type === 'password') {
        input.type = 'text';
        icon.className = 'bi bi-eye-slash';
      } else {
        input.type = 'password';
        icon.className = 'bi bi-eye';
      }
    });
  </script>
  <script src="js/auth.js"></script>
</body>
</html>
