<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CorpVault – Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link href="css/style.css" rel="stylesheet" />
</head>
<body class="app-page">

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg app-navbar">
    <div class="container-fluid px-4">
      <span class="navbar-brand">
        <i class="bi bi-shield-lock-fill me-2"></i>CorpVault
      </span>
      <div class="d-flex align-items-center gap-3 ms-auto">
        <span class="text-muted small" id="nav-username"></span>
        <a href="teams.html" class="btn btn-sm btn-outline-light">
          <i class="bi bi-people me-1"></i>Teams
        </a>
        <a href="admin.html" class="btn btn-sm btn-outline-warning d-none" id="admin-link">
          <i class="bi bi-gear me-1"></i>Admin
        </a>
        <button class="btn btn-sm btn-outline-danger" id="logout-btn">
          <i class="bi bi-box-arrow-right"></i>
        </button>
      </div>
    </div>
  </nav>

  <div class="container-fluid px-4 py-4">
    <!-- Stats Row -->
    <div class="row g-3 mb-4">
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="bi bi-key-fill stat-icon text-primary"></i>
          <div>
            <div class="stat-number" id="stat-total">0</div>
            <div class="stat-label">Total Passwords</div>
          </div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="bi bi-tags-fill stat-icon text-success"></i>
          <div>
            <div class="stat-number" id="stat-categories">0</div>
            <div class="stat-label">Categories</div>
          </div>
        </div>
      </div>
      <div class="col-sm-4">
        <div class="stat-card">
          <i class="bi bi-clock-history stat-icon text-warning"></i>
          <div>
            <div class="stat-number" id="stat-recent">0</div>
            <div class="stat-label">Added This Month</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Toolbar -->
    <div class="d-flex flex-wrap gap-2 mb-3 align-items-center">
      <div class="input-group" style="max-width:300px">
        <span class="input-group-text"><i class="bi bi-search"></i></span>
        <input type="text" class="form-control" id="search-input" placeholder="Search passwords..." />
      </div>
      <select class="form-select w-auto" id="category-filter">
        <option value="">All Categories</option>
      </select>
      <button class="btn btn-primary ms-auto" data-bs-toggle="modal" data-bs-target="#passwordModal" onclick="openAddModal()">
        <i class="bi bi-plus-lg me-1"></i>Add Password
      </button>
      <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#generatorModal">
        <i class="bi bi-magic me-1"></i>Generator
      </button>
    </div>

    <!-- Password Cards -->
    <div id="password-grid" class="row g-3">
      <div class="col-12 text-center text-muted py-5" id="empty-state">
        <i class="bi bi-inbox display-4 d-block mb-2"></i>
        No passwords yet. Click "Add Password" to get started.
      </div>
    </div>
  </div>

  <!-- Add/Edit Password Modal -->
  <div class="modal fade" id="passwordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="modal-title">Add Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="entry-id" />
          <div class="mb-3">
            <label class="form-label">Title <span class="text-danger">*</span></label>
            <input type="text" class="form-control" id="entry-title" placeholder="e.g. Gmail Work Account" />
          </div>
          <div class="mb-3">
            <label class="form-label">Username / Email</label>
            <input type="text" class="form-control" id="entry-username" placeholder="username@company.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Password <span class="text-danger">*</span></label>
            <div class="input-group">
              <input type="password" class="form-control" id="entry-password" placeholder="Enter password" />
              <button class="btn btn-outline-secondary" type="button" onclick="toggleEntryPw()">
                <i class="bi bi-eye" id="entry-pw-icon"></i>
              </button>
              <button class="btn btn-outline-primary" type="button" onclick="fillGeneratedPassword()">
                <i class="bi bi-magic"></i>
              </button>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Website URL</label>
            <input type="url" class="form-control" id="entry-url" placeholder="https://example.com" />
          </div>
          <div class="mb-3">
            <label class="form-label">Category</label>
            <input type="text" class="form-control" id="entry-category" placeholder="General, Social, Banking..." />
          </div>
          <div class="mb-3">
            <label class="form-label">Notes</label>
            <textarea class="form-control" id="entry-notes" rows="2" placeholder="Optional notes..."></textarea>
          </div>
          <div id="modal-alert" class="alert d-none"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" id="save-btn" onclick="savePassword()">Save</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Password Generator Modal -->
  <div class="modal fade" id="generatorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-magic me-2"></i>Password Generator</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Length: <strong id="gen-length-label">16</strong></label>
            <input type="range" class="form-range" id="gen-length" min="8" max="64" value="16"
                   oninput="document.getElementById('gen-length-label').textContent=this.value" />
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gen-uppercase" checked />
                <label class="form-check-label">Uppercase (A-Z)</label>
              </div>
            </div>
            <div class="col-6">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gen-digits" checked />
                <label class="form-check-label">Numbers (0-9)</label>
              </div>
            </div>
            <div class="col-6 mt-2">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="gen-symbols" checked />
                <label class="form-check-label">Symbols (!@#...)</label>
              </div>
            </div>
          </div>
          <div class="input-group mb-3">
            <input type="text" class="form-control font-monospace" id="gen-result" readonly />
            <button class="btn btn-outline-secondary" onclick="copyGenerated()"><i class="bi bi-clipboard"></i></button>
          </div>
          <div id="gen-alert" class="alert alert-success d-none">Copied to clipboard!</div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-primary" onclick="generatePassword()">
            <i class="bi bi-arrow-clockwise me-1"></i>Generate
          </button>
          <button class="btn btn-primary" onclick="useGenerated()">Use This Password</button>
        </div>
      </div>
    </div>
  </div>

  <!-- View Password Modal -->
  <div class="modal fade" id="viewModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="view-title">View Entry</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="view-body"></div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
          <button class="btn btn-warning" id="view-edit-btn">Edit</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Change Password Modal -->
  <div class="modal fade" id="changePasswordModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Change My Password</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="mb-3">
            <label class="form-label">Current Password</label>
            <input type="password" class="form-control" id="cp-current" />
          </div>
          <div class="mb-3">
            <label class="form-label">New Password</label>
            <input type="password" class="form-control" id="cp-new" />
          </div>
          <div id="cp-alert" class="alert d-none"></div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button class="btn btn-primary" onclick="changeMyPassword()">Update Password</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/dashboard.js"></script>
</body>
</html>
